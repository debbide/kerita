name: Kerit-Renew
on:
  repository_dispatch:
    types: [kerit]
jobs:
  run_kerit_login:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 🛡️ 启动 sing-box 代理转发
        env:
          PROXY_STR: ${{ secrets.GOST_PROXY }}
          FORCE_IPV6: "1"
        run: |
          # 固定 sing-box 版本，避免参数变化导致配置失效
          SINGBOX_VERSION="1.8.10"
          SINGBOX_ARCHIVE="sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          SINGBOX_DIR="sing-box-${SINGBOX_VERSION}-linux-amd64"
          SINGBOX_BIN="./${SINGBOX_DIR}/sing-box"

          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/${SINGBOX_ARCHIVE}"
          tar -xzf "${SINGBOX_ARCHIVE}"
          chmod +x "${SINGBOX_BIN}"

          if [ -f generate_singbox_config_ipv6.py ]; then
            echo "使用 generate_singbox_config_ipv6.py 生成配置"
            python generate_singbox_config_ipv6.py
          else
            echo "⚠️ 未找到 generate_singbox_config_ipv6.py，回退到 generate_singbox_config.py"
            python generate_singbox_config.py
          fi

          if ! "${SINGBOX_BIN}" check -c config.json; then
            echo "❌ Invalid sing-box config generated!"
            exit 1
          fi

          echo "启动 sing-box 隧道..."
          nohup "${SINGBOX_BIN}" run -c config.json > singbox.log 2>&1 &
          sleep 8
          echo "测试本地代理连通性..."
          curl -v --connect-timeout 10 -x socks5://127.0.0.1:1080 https://api.ipify.org 2>&1 || echo "curl exit code: $?"
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install uc_driver
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          KERIT_ACCOUNT: ${{ secrets.KERIT_ACCOUNT }}
          KERIT_PROXY: socks5://127.0.0.1:1080
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python kerit_renew.py
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
